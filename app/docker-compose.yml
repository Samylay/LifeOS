services:
  app:
    build: .
    image: lifeos
    container_name: lifeos
    restart: unless-stopped
    # Bound to localhost; exposed to the tailnet over HTTPS via `tailscale serve`
    # (sudo tailscale serve --bg 3000 → https://homelab.tail069527.ts.net).
    # The app has no login, and `tailscale serve` only accepts tailnet traffic.
    ports:
      - "127.0.0.1:3000:3000"
      # Also bound to the tailscale IP (same pattern as n8n): phones on the
      # tailnet reach the app by raw IP (http://100.124.149.101:3000) with no
      # MagicDNS dependency — ts.net names are NOT in public DNS, and Samy's
      # phone runs with 'Use Tailscale DNS' off (carrier DNS conflict).
      - "100.124.149.101:3000:3000"
    env_file:
      - .env
    environment:
      # Local LLM via Ollama running on the homelab host (not in this container).
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "qwen2.5:7b"
      LIFEOS_DB_PATH: "/data/lifeos.db"
      HERMES_STATUS: "/hermes/status.json"
      DOCKER_SOCK: "/var/run/docker.sock"
      # The Hermes-managed Obsidian vault, mounted read-write below so LifeOS
      # can browse/search notes and capture new ones (Hermes then enriches).
      KB_PATH: "/vault"
      # Notes LifeOS creates are chowned to this uid/gid so Hermes (host user)
      # can append its summary/tags. Match `id -u`/`id -g` of the vault owner.
      KB_UID: "1000"
      KB_GID: "1000"
      # AI goal drafting via the Claude Code CLI (`claude -p`), using the mounted
      # ~/.claude subscription auth — no API key/bill. Set GEN_PROVIDER=ollama
      # to fall back to the local model.
      GEN_PROVIDER: "claude-cli"
      CLAUDE_CLI_MODEL: "sonnet"
      CLAUDE_CONFIG_DIR: "/root/.claude"
      # Prometheus (monitoring stack) for the /status host vitals — reached by
      # service name over the shared monitoring network (declared below).
      PROM_URL: "http://prometheus:9090"
      # Morning brief — built in-app (src/lib/brief, daily 06:00 BRIEF_TZ).
      # BRIEF_PATH is the retired host aggregator's output, kept as a read
      # fallback during the transition. Todoist token + n8n webhook in .env.
      BRIEF_TZ: "Asia/Tokyo"
      BRIEF_OUT: "/data/brief.json"
      OBJECTIVES_DIR: "/objectives"
      BRIEF_PATH: "/brief/brief.json"
      WHISPER_URL: "http://host.docker.internal:8091"
      # Pager push arm: self-hosted ntfy (~/infra/ntfy), reached via the host
      # tailscale IP (docker-proxy binds it there; host.docker.internal maps
      # to the bridge gateway, where nothing listens). Click opens /pager.
      NTFY_URL: "http://100.124.149.101:8096"
      NTFY_TOPIC: "homelab"
      # IP-based so notification taps work regardless of the phone's DNS state.
      PAGER_CLICK_URL: "http://100.124.149.101:3000/pager"
    networks:
      - default
      - monitoring
    extra_hosts:
      # Lets the container reach the host's Ollama at host.docker.internal.
      - "host.docker.internal:host-gateway"
    volumes:
      - lifeos-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/quorky/.hermes:/hermes:ro
      # Legacy morning-brief output (retired host aggregator) — read fallback.
      - /home/quorky/services/brief/out:/brief:ro
      # Objectives rotation config+state (shared with host classify.py).
      - /home/quorky/services/objectives:/objectives
      - /home/quorky/vault/obsidian:/vault
      # Claude CLI auth/config (container runs as root → /root/.claude).
      - /home/quorky/.claude:/root/.claude
      # T28: tracked-centres (daily-planning dynamic blocks) reads host-path
      # ROADMAP.md files + ~/infra/goals state; mounted read-only at the SAME
      # absolute paths so the module's host defaults work unchanged in-container.
      - /home/quorky/apps:/home/quorky/apps:ro
      - /home/quorky/infra:/home/quorky/infra:ro

volumes:
  lifeos-data:

networks:
  # Shared with the monitoring stack (~/infra/monitoring) so LifeOS can query
  # Prometheus by service name for the /status host vitals.
  monitoring:
    external: true
    name: monitoring_monitoring
  default:
