services:
  app:
    build: .
    image: lifeos
    container_name: lifeos
    restart: unless-stopped
    # Bound to localhost; exposed to the tailnet over HTTPS via `tailscale serve`
    # (sudo tailscale serve --bg 3000 → https://homelab.tail069527.ts.net).
    # The app has no login, and `tailscale serve` only accepts tailnet traffic.
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      # Local LLM via Ollama running on the homelab host (not in this container).
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "qwen2.5:7b"
      LIFEOS_DB_PATH: "/data/lifeos.db"
      HERMES_STATUS: "/hermes/status.json"
      DOCKER_SOCK: "/var/run/docker.sock"
      # The Hermes-managed Obsidian vault, mounted read-write below so LifeOS
      # can browse/search notes and capture new ones (Hermes then enriches).
      KB_PATH: "/vault"
      # Notes LifeOS creates are chowned to this uid/gid so Hermes (host user)
      # can append its summary/tags. Match `id -u`/`id -g` of the vault owner.
      KB_UID: "1000"
      KB_GID: "1000"
      # AI goal drafting via the Claude Code CLI (`claude -p`), using the mounted
      # ~/.claude subscription auth — no API key/bill. Set GEN_PROVIDER=ollama
      # to fall back to the local model.
      GEN_PROVIDER: "claude-cli"
      CLAUDE_CLI_MODEL: "sonnet"
      CLAUDE_CONFIG_DIR: "/root/.claude"
      # Prometheus (monitoring stack) for the /status host vitals — reached by
      # service name over the shared monitoring network (declared below).
      PROM_URL: "http://prometheus:9090"
      # Morning brief: aggregator output (mounted below) + host whisper service
      # for prompt-card voice notes.
      BRIEF_PATH: "/brief/brief.json"
      WHISPER_URL: "http://host.docker.internal:8091"
    networks:
      - default
      - monitoring
    extra_hosts:
      # Lets the container reach the host's Ollama at host.docker.internal.
      - "host.docker.internal:host-gateway"
    volumes:
      - lifeos-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/quorky/.hermes:/hermes:ro
      # Morning brief written by ~/services/brief (brief.timer, 06:00).
      - /home/quorky/services/brief/out:/brief:ro
      - /home/quorky/vault/obsidian:/vault
      # Claude CLI auth/config (container runs as root → /root/.claude).
      - /home/quorky/.claude:/root/.claude

volumes:
  lifeos-data:

networks:
  # Shared with the monitoring stack (~/infra/monitoring) so LifeOS can query
  # Prometheus by service name for the /status host vitals.
  monitoring:
    external: true
    name: monitoring_monitoring
  default:
